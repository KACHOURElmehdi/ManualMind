<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Quiz DOM</title>
    <style>
      body {
        font-family: "Trebuchet MS", sans-serif;
        margin: 24px;
      }
      .quiz-question {
        border: 1px solid #cad8ef;
        border-radius: 10px;
        padding: 14px;
        max-width: 680px;
      }
      .instructions {
        color: #445a72;
      }
    </style>
  </head>
  <body>
    <section class="quiz-question" data-question>
      <p class="instructions">Choose the best answer from the options below.</p>
      <h2 class="question-text">Which protocol secures HTTP traffic for websites?</h2>
      <ul>
        <li>TFTP</li>
        <li>FTP</li>
        <li>HTTPS</li>
        <li>SMTP</li>
      </ul>
    </section>
  </body>
</html>
